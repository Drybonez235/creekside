<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" rx="12" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="400" y="40" fill="#f8fafc" font-size="20" font-weight="700" text-anchor="middle">Dental Google Ads ROI Calculator</text>
  <text x="400" y="62" fill="#94a3b8" font-size="13" text-anchor="middle">Conservative estimates based on Creekside Marketing client data</text>

  <!-- Flow diagram -->
  <!-- Step 1: Ad Spend -->
  <rect x="30" y="100" width="150" height="80" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="105" y="130" fill="#93c5fd" font-size="11" font-weight="600" text-anchor="middle">MONTHLY AD SPEND</text>
  <text x="105" y="158" fill="#f8fafc" font-size="22" font-weight="700" text-anchor="middle">$3,000</text>

  <!-- Arrow 1 -->
  <path d="M180 140 L210 140" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/></marker></defs>

  <!-- Step 2: Clicks -->
  <rect x="210" y="100" width="120" height="80" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="270" y="128" fill="#93c5fd" font-size="11" font-weight="600" text-anchor="middle">CLICKS</text>
  <text x="270" y="155" fill="#f8fafc" font-size="20" font-weight="700" text-anchor="middle">500</text>
  <text x="270" y="172" fill="#64748b" font-size="10" text-anchor="middle">@ $6 avg CPC</text>

  <!-- Arrow 2 -->
  <path d="M330 140 L360 140" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: Leads -->
  <rect x="360" y="100" width="120" height="80" rx="8" fill="#1e3a5f" stroke="#8b5cf6" stroke-width="1"/>
  <text x="420" y="128" fill="#c4b5fd" font-size="11" font-weight="600" text-anchor="middle">LEADS</text>
  <text x="420" y="155" fill="#f8fafc" font-size="20" font-weight="700" text-anchor="middle">50</text>
  <text x="420" y="172" fill="#64748b" font-size="10" text-anchor="middle">10% conv rate</text>

  <!-- Arrow 3 -->
  <path d="M480 140 L510 140" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4: Patients -->
  <rect x="510" y="100" width="120" height="80" rx="8" fill="#1e3a5f" stroke="#f59e0b" stroke-width="1"/>
  <text x="570" y="128" fill="#fcd34d" font-size="11" font-weight="600" text-anchor="middle">NEW PATIENTS</text>
  <text x="570" y="155" fill="#f8fafc" font-size="20" font-weight="700" text-anchor="middle">20</text>
  <text x="570" y="172" fill="#64748b" font-size="10" text-anchor="middle">40% close rate</text>

  <!-- Arrow 4 -->
  <path d="M630 140 L660 140" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 5: Revenue -->
  <rect x="660" y="95" width="120" height="90" rx="8" fill="#064e3b" stroke="#10b981" stroke-width="2"/>
  <text x="720" y="123" fill="#6ee7b7" font-size="11" font-weight="600" text-anchor="middle">MONTHLY REVENUE</text>
  <text x="720" y="155" fill="#f8fafc" font-size="22" font-weight="700" text-anchor="middle">$24,000</text>
  <text x="720" y="175" fill="#6ee7b7" font-size="12" font-weight="600" text-anchor="middle">8x RETURN</text>

  <!-- Bottom stats row -->
  <line x1="40" y1="220" x2="760" y2="220" stroke="#334155" stroke-width="1"/>

  <!-- Stat boxes -->
  <rect x="40" y="240" width="220" height="100" rx="8" fill="#1a2332"/>
  <text x="150" y="268" fill="#94a3b8" font-size="12" text-anchor="middle">Cost Per Lead</text>
  <text x="150" y="300" fill="#f8fafc" font-size="28" font-weight="700" text-anchor="middle">$60</text>
  <text x="150" y="322" fill="#64748b" font-size="11" text-anchor="middle">$3,000 / 50 leads</text>

  <rect x="290" y="240" width="220" height="100" rx="8" fill="#1a2332"/>
  <text x="400" y="268" fill="#94a3b8" font-size="12" text-anchor="middle">Cost Per Patient</text>
  <text x="400" y="300" fill="#f8fafc" font-size="28" font-weight="700" text-anchor="middle">$150</text>
  <text x="400" y="322" fill="#64748b" font-size="11" text-anchor="middle">$3,000 / 20 patients</text>

  <rect x="540" y="240" width="220" height="100" rx="8" fill="#0a2e1f"/>
  <text x="650" y="268" fill="#6ee7b7" font-size="12" text-anchor="middle">Lifetime Patient Value</text>
  <text x="650" y="300" fill="#10b981" font-size="28" font-weight="700" text-anchor="middle">$5,000+</text>
  <text x="650" y="322" fill="#6ee7b7" font-size="11" text-anchor="middle">5-10 year retention</text>

  <!-- Branding -->
  <text x="760" y="390" fill="#334155" font-size="10" text-anchor="end">creeksidemarketingpros.com</text>
</svg>
