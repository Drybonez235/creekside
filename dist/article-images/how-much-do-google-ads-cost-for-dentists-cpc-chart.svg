<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#f87171"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="40" y="45" fill="#f8fafc" font-size="20" font-weight="700">Google Ads Cost Per Click by Dental Procedure</text>
  <text x="40" y="68" fill="#94a3b8" font-size="13">Based on Creekside Marketing campaign data | $20M+ managed ad spend</text>

  <!-- Chart area -->
  <!-- General Dentistry -->
  <text x="40" y="115" fill="#e2e8f0" font-size="14" font-weight="500">General Dentistry</text>
  <text x="40" y="132" fill="#64748b" font-size="11">Cleanings, checkups, new patients</text>
  <rect x="220" y="108" width="114" height="28" rx="4" fill="url(#bar1)" opacity="0.3"/>
  <rect x="220" y="108" width="114" height="28" rx="4" fill="url(#bar1)"/>
  <text x="344" y="127" fill="#93c5fd" font-size="14" font-weight="600"> $2 - $8</text>

  <!-- Emergency -->
  <text x="40" y="185" fill="#e2e8f0" font-size="14" font-weight="500">Emergency Dentistry</text>
  <text x="40" y="202" fill="#64748b" font-size="11">Toothache, broken tooth, urgent</text>
  <rect x="220" y="178" width="213" height="28" rx="4" fill="url(#bar2)" opacity="0.3"/>
  <rect x="220" y="178" width="213" height="28" rx="4" fill="url(#bar2)"/>
  <text x="443" y="197" fill="#c4b5fd" font-size="14" font-weight="600"> $5 - $15</text>

  <!-- Cosmetic -->
  <text x="40" y="255" fill="#e2e8f0" font-size="14" font-weight="500">Cosmetic Dentistry</text>
  <text x="40" y="272" fill="#64748b" font-size="11">Veneers, whitening, smile makeover</text>
  <rect x="220" y="248" width="284" height="28" rx="4" fill="url(#bar3)" opacity="0.3"/>
  <rect x="220" y="248" width="284" height="28" rx="4" fill="url(#bar3)"/>
  <text x="514" y="267" fill="#fcd34d" font-size="14" font-weight="600"> $6 - $20</text>

  <!-- Implants -->
  <text x="40" y="325" fill="#e2e8f0" font-size="14" font-weight="500">Dental Implants</text>
  <text x="40" y="342" fill="#64748b" font-size="11">Implants, All-on-4, full arch</text>
  <rect x="220" y="318" width="497" height="28" rx="4" fill="url(#bar4)" opacity="0.3"/>
  <rect x="220" y="318" width="497" height="28" rx="4" fill="url(#bar4)"/>
  <text x="727" y="337" fill="#fca5a5" font-size="14" font-weight="600"> $12 - $35</text>

  <!-- Scale markers -->
  <line x1="220" y1="365" x2="220" y2="370" stroke="#475569" stroke-width="1"/>
  <text x="220" y="385" fill="#64748b" font-size="11" text-anchor="middle">$0</text>
  <line x1="362" y1="365" x2="362" y2="370" stroke="#475569" stroke-width="1"/>
  <text x="362" y="385" fill="#64748b" font-size="11" text-anchor="middle">$10</text>
  <line x1="504" y1="365" x2="504" y2="370" stroke="#475569" stroke-width="1"/>
  <text x="504" y="385" fill="#64748b" font-size="11" text-anchor="middle">$20</text>
  <line x1="646" y1="365" x2="646" y2="370" stroke="#475569" stroke-width="1"/>
  <text x="646" y="385" fill="#64748b" font-size="11" text-anchor="middle">$30</text>

  <!-- Axis line -->
  <line x1="220" y1="365" x2="720" y2="365" stroke="#334155" stroke-width="1"/>
  <text x="470" y="410" fill="#475569" font-size="11" text-anchor="middle">Cost Per Click (USD)</text>

  <!-- Branding -->
  <text x="760" y="440" fill="#334155" font-size="10" text-anchor="end">creeksidemarketingpros.com</text>
</svg>
