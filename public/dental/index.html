    <!-- Dental LP Tracking: UTM/fbclid capture + custom event delegation -->
    <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var utmData = {};
      ['utm_source','utm_medium','utm_campaign','utm_content','utm_term','fbclid'].forEach(function(key) {
        var val = params.get(key);
        if (val) utmData[key] = val;
      });
      if (Object.keys(utmData).length > 0) {
        try { sessionStorage.setItem('dental_lp_utm', JSON.stringify(utmData)); } catch(e) {}
      } else {
        try { var stored = sessionStorage.getItem('dental_lp_utm'); if (stored) utmData = JSON.parse(stored); } catch(e) {}
      }

      function appendUtmToLinks() {
        document.querySelectorAll('a[href*="dental.creeksidemarketingpros"], a[href*="calendly.com"]').forEach(function(link) {
          try {
            var url = new URL(link.href);
            Object.keys(utmData).forEach(function(key) {
              if (!url.searchParams.has(key)) url.searchParams.set(key, utmData[key]);
            });
            link.href = url.toString();
          } catch(e) {}
        });
      }
      var obs = new MutationObserver(function() { appendUtmToLinks(); });
      obs.observe(document.documentElement, { childList: true, subtree: true });

      document.addEventListener('click', function(e) {
        var el = e.target.closest ? e.target.closest('a, button') : e.target;
        if (!el) return;
        var text = (el.textContent || '').trim();
        var href = el.getAttribute('href') || '';
        if (href.match(/dental\.creeksidemarketingpros[^"]*\/blueprint\/[0-9a-f-]{36}/i)) {
          if (window.fbq) window.fbq('trackCustom', 'Dental_LP_ExampleView', utmData);
          if (window.gtag) window.gtag('event', 'Dental_LP_ExampleView', utmData);
        } else if (text.match(/Get Your (Free )?(Paid Ads )?Blueprint/i) || (href.indexOf('dental.creeksidemarketingpros') !== -1 && href !== window.location.href)) {
          if (window.fbq) window.fbq('trackCustom', 'Dental_LP_BlueprintClick', utmData);
          if (window.gtag) window.gtag('event', 'Dental_LP_BlueprintClick', utmData);
        }
        if (text.match(/Book a (Call|Strategy Call)/i) || href.indexOf('calendly.com') !== -1) {
          if (window.fbq) window.fbq('trackCustom', 'Dental_LP_BookCallClick', utmData);
          if (window.gtag) window.gtag('event', 'Dental_LP_BookCallClick', utmData);
        }
      });

      var _contactFired = false;
      function fireContactSubmit() {
        if (_contactFired) return;
        _contactFired = true;
        if (window.fbq) window.fbq('trackCustom', 'Dental_LP_ContactSubmit', utmData);
        if (window.gtag) window.gtag('event', 'Dental_LP_ContactSubmit', utmData);
        setTimeout(function() { _contactFired = false; }, 3000);
      }
      document.addEventListener('submit', fireContactSubmit);
      var _fetch = window.fetch;
      window.fetch = function() {
        if (typeof arguments[0] === 'string' && arguments[0].indexOf('/api/contact') !== -1) {
          fireContactSubmit();
        }
        return _fetch.apply(this, arguments);
      };
    })();
    </script>

    <div id="root"></div>
    <!-- Inline YouTube player: click thumbnail → play embed instead of redirecting -->
    <script>
    (function() {
      function extractVideoId(url) {
        var m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed|v|watch\?v=)\/?)([A-Za-z0-9_-]{11})/);
        return m ? m[1] : null;
      }
      document.addEventListener('click', function(e) {
        var link = e.target.closest('a[href*="youtu.be"], a[href*="youtube.com"]');
        if (!link) return;
        var videoId = extractVideoId(link.href);
        if (!videoId) return;
        e.preventDefault();
        e.stopPropagation();
        var container = link.closest('.aspect-video') || link.parentElement;
        if (!container) return;
        var iframe = document.createElement('iframe');
        iframe.src = 'https://www.youtube.com/embed/' + videoId + '?autoplay=1&rel=0';
        iframe.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture');
        iframe.setAttribute('allowfullscreen', '');
        iframe.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;border:none;z-index:20;';
        container.style.position = 'relative';
        container.innerHTML = '';
        container.appendChild(iframe);
      }, true);
    })();
    </script>
